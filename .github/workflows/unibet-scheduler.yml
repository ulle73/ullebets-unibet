name: Unibet Data Sync

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

concurrency:
  group: unibet-data-sync
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      MONGODB_DB: ullebets_unibet
      SOURCE_MONGODB_DB: app
      MAX_MATCHES_PER_RUN: 500
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - run: npm run healthcheck
      - run: npm run indexes
      - run: npm run source:scan
      - run: npm run discover
      - run: npm run import:snapshots
